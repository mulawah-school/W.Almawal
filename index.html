    <script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        import { getFirestore, doc as fbDoc, getDoc, setDoc, deleteDoc, serverTimestamp, collection as fbCollection, onSnapshot, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAnoRS_SN3iz3fdLAHkCyk90djaqWd6aSI",
            authDomain: "monitoring-test-e6867.firebaseapp.com",
            projectId: "monitoring-test-e6867",
            storageBucket: "monitoring-test-e6867.firebasestorage.app",
            messagingSenderId: "654033386790",
            appId: "1:654033386790:web:c1c656ed6946358a7b55e7",

        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        try { setPersistence(auth, browserSessionPersistence); } catch(e) { console.warn('تعذر تثبيت جلسة الدخول في المتصفح', e); }
        const db = getFirestore(app);
        const AUTH_LAST_ACTIVITY_KEY = 'control_auth_last_activity_v1';
        const AUTH_LOCAL_SESSION_KEY = 'control_auth_local_session_v2';
        const AUTH_SESSION_TIMEOUT_MS = 5 * 60 * 1000;
        let storageSaveTimer = null;
        let restoringSchoolStorage = false;
        let manualLoginInThisPage = false;
        let lastOpenedAuthUid = null;

        const CONTROL_LOGOUT_FLAG_KEY = 'control_force_logged_out_v1';
        const CONTROL_TIMEOUT_FLAG_KEY = 'control_session_timeout_v1';
        const CONTROL_DEFAULT_ONLY_SCHOOL_IDS = new Set(['school002']);
        const CONTROL_LOCAL_BACKUP_PREFIX = 'control_school_local_backup_v1_';

        function normalizeSchoolUserId(value) {
            return String(value || '').trim().toLowerCase();
        }

        function isDefaultOnlySchoolUser(userData = {}, resolvedSchoolId = '') {
            const ids = [
                resolvedSchoolId,
                userData.schoolId,
                userData.resolvedSchoolId,
                userData.username
            ].map(normalizeSchoolUserId).filter(Boolean);
            return ids.some(id => CONTROL_DEFAULT_ONLY_SCHOOL_IDS.has(id));
        }

        function sanitizeDefaultOnlySchoolInfo(userData = {}) {
            return {
                ...userData,
                schoolName: '',
                school: '',
                directorate: '',
                logoDataUrl: '',
                schoolLogoDataUrl: ''
            };
        }

        function shouldBackupControlRuntimeKey(key) {
            return /^(monitoring_|savedExamDate$|control_bridge_|exam_sessions_|exam_envelopes_|exam_daily_notes_|exam_proctoring_extra_|exam_second_period_proctoring_|exam_individual_absentee_|exam_violation_|exam_signatures_|exam_signature_deletes_)/.test(String(key || '')) ||
                   String(key || '') === 'exam_control_committee_signatures_global' ||
                   String(key || '') === 'monitoring_control_bridge_v1' ||
                   String(key || '') === 'control_proctoring_clean_version';
        }

        function backupSchoolLocalRuntimeKeys(schoolId) {
            const safeSchoolId = normalizeSchoolUserId(schoolId);
            if (!safeSchoolId || CONTROL_DEFAULT_ONLY_SCHOOL_IDS.has(safeSchoolId)) return false;
            try {
                const items = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i) || '';
                    if (!shouldBackupControlRuntimeKey(key)) continue;
                    const value = localStorage.getItem(key);
                    if (typeof value === 'string') items[key] = value;
                }
                localStorage.setItem(CONTROL_LOCAL_BACKUP_PREFIX + safeSchoolId, JSON.stringify({ items, savedAt: Date.now() }));
                return true;
            } catch(e) {
                console.warn('تعذر حفظ نسخة محلية مؤقتة قبل تبديل المدرسة', e);
                return false;
            }
        }

        function restoreSchoolLocalRuntimeBackup(schoolId) {
            const safeSchoolId = normalizeSchoolUserId(schoolId);
            if (!safeSchoolId) return false;
            try {
                const raw = localStorage.getItem(CONTROL_LOCAL_BACKUP_PREFIX + safeSchoolId);
                if (!raw) return false;
                const backup = JSON.parse(raw);
                const items = backup && backup.items ? backup.items : {};
                Object.keys(items).forEach(key => {
                    if (typeof items[key] === 'string') localStorage.setItem(key, items[key]);
                });
                return true;
            } catch(e) {
                console.warn('تعذر استرجاع النسخة المحلية المؤقتة للمدرسة', e);
                return false;
            }
        }

        function clearDefaultOnlyRuntimeKeys(currentSchoolId) {
            if (!CONTROL_DEFAULT_ONLY_SCHOOL_IDS.has(normalizeSchoolUserId(currentSchoolId))) return false;
            try {
                const keepKey = currentSchoolId ? ('monitoring_distribution_full_state_v4_' + currentSchoolId) : '';
                const toRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i) || '';
                    if (key === keepKey || isProtectedSchool001StorageKey(key) || key.startsWith(CONTROL_LOCAL_BACKUP_PREFIX)) continue;
                    if (shouldBackupControlRuntimeKey(key) || key === ('monitoring_distribution_teachers_v2_' + currentSchoolId)) toRemove.push(key);
                }
                [...new Set(toRemove)].forEach(key => {
                    try { localStorage.removeItem(key); } catch(e) {}
                });
                return true;
            } catch(e) {
                console.warn('تعذر تنظيف بيانات المستخدم الافتراضي فقط', e);
                return false;
            }
        }

        function clearOldControlMonitorData() {
            try {
                const exactKeys = [
                    'monitoringDistributionData',
                    'monitoringDistributionAppData',
                    'monitoringDistributionState',
                    'monitoringAppState',
                    'smartMonitorData',
                    'smart_monitor_data',
                    'smartMonitoringData',
                    'schoolMonitoringData',
                    'controlMonitoringData',
                    'controlSmartMonitorData',
                    'dailyReportData',
                    'envelopeOpeningData',
                    'examScheduleData',
                    'teacherMonitorData',
                    'teachersData',
                    'examsData',
                    'lastMonitoringState',
                    'monitoringState',
                    'controlBridgeData',
                    'smartDataBridge',
                    '__LAST_MONITORING_STATE_STRING'
                ];
                exactKeys.forEach((key) => {
                    try { localStorage.removeItem(key); } catch(e) {}
                    try { sessionStorage.removeItem(key); } catch(e) {}
                });

                const patterns = [
                    'monitoring_',
                    'smart_monitor',
                    'smartMonitor',
                    'control_bridge_',
                    'exam_sessions_',
                    'exam_envelopes_',
                    'exam_daily_notes_',
                    'exam_proctoring_extra_',
                    'exam_second_period_proctoring_',
                    'exam_individual_absentee_',
                    'exam_violation_',
                    'exam_signatures_',
                    'exam_signature_deletes_'
                ];

                for (let i = localStorage.length - 1; i >= 0; i--) {
                    const key = localStorage.key(i);
                    if (!key) continue;
                    if (isProtectedSchool001StorageKey(key)) continue;
                    if (/^monitoring_distribution_(full_state_v4|teachers_v2)_/.test(key)) continue;
                    if (patterns.some((p) => key.includes(p))) {
                        try { localStorage.removeItem(key); } catch(e) {}
                    }
                }
                for (let i = sessionStorage.length - 1; i >= 0; i--) {
                    const key = sessionStorage.key(i);
                    if (!key) continue;
                    if (patterns.some((p) => key.includes(p))) {
                        try { sessionStorage.removeItem(key); } catch(e) {}
                    }
                }
                try { window.__LAST_MONITORING_STATE_STRING = ''; } catch(e) {}
                try { window.dispatchEvent(new Event('smart-data-cleared')); } catch(e) {}
            } catch(e) {}
        }

        window.clearOldControlMonitorData = clearOldControlMonitorData;


        function setLoginError(message) {
            const el = document.getElementById('control-login-error');
            if (el) el.textContent = message || '';
        }
        function setAuthStatus(message, mode = 'neutral') {
            const el = document.getElementById('control-auth-status');
            if (!el) return;
            el.textContent = message || '';
            el.style.background = mode === 'success' ? '#dcfce7' : mode === 'error' ? '#fee2e2' : mode === 'loading' ? '#dbeafe' : '#f1f5f9';
            el.style.color = mode === 'success' ? '#166534' : mode === 'error' ? '#991b1b' : mode === 'loading' ? '#1e40af' : '#475569';
        }
        function showLogin() {
            const login = document.getElementById('control-login-screen');
            const root = document.getElementById('root');
            clearLoginFields();
            if (login) login.style.display = 'flex';
            if (root) root.style.display = 'none';
        }
        function showApp() {
            const login = document.getElementById('control-login-screen');
            const root = document.getElementById('root');
            if (login) login.style.display = 'none';
            if (root) root.style.display = 'block';
        }
        function markActivity() {
            try { localStorage.setItem(AUTH_LAST_ACTIVITY_KEY, String(Date.now())); } catch(e) {}
        }
        function clearLoginFields() {
            try {
                const username = document.getElementById('control-login-username');
                const password = document.getElementById('control-login-password');
                if (username) username.value = '';
                if (password) password.value = '';
            } catch(e) {}
        }
        function resetControlRuntimeForLogin() {
            try {
                window.CONTROL_APP_AUTH_READY = false;
                window.currentSchoolId = null;
                window.currentSchoolInfo = null;
                window.cloudDB = null;
                window.monitoringFirebase = null;
                lastOpenedAuthUid = null;
                manualLoginInThisPage = false;
                clearLocalControlSession();
                if (typeof window.resetControlAppShell === 'function') window.resetControlAppShell();
                showLogin();
            } catch(e) {}
        }
        function saveLocalControlSession(user, userData) {
            try {
                localStorage.removeItem(AUTH_LOCAL_SESSION_KEY);
            } catch(e) {}
        }
        function getLocalControlSession() {
            return null;
        }
        function clearLocalControlSession() {
            try { localStorage.removeItem(AUTH_LOCAL_SESSION_KEY); } catch(e) {}
        }
        function sessionExpired() {
            try {
                const last = Number(localStorage.getItem(AUTH_LAST_ACTIVITY_KEY) || 0);
                if (!last) return false;
                return Date.now() - last > AUTH_SESSION_TIMEOUT_MS;
            } catch(e) {
                return false;
            }
        }
        function requireFreshLoginAfterTimeout() {
            try {
                localStorage.setItem(CONTROL_LOGOUT_FLAG_KEY, '1');
                localStorage.setItem(CONTROL_TIMEOUT_FLAG_KEY, '1');
                sessionStorage.setItem(CONTROL_LOGOUT_FLAG_KEY, '1');
                sessionStorage.setItem(CONTROL_TIMEOUT_FLAG_KEY, '1');
                localStorage.removeItem(AUTH_LAST_ACTIVITY_KEY);
            } catch(e) {}
            resetControlRuntimeForLogin();
            setAuthStatus('انتهت الجلسة', 'neutral');
            setLoginError('انتهت مدة الجلسة بعد 5 دقائق بدون حركة. أدخل بيانات المدرسة للدخول من جديد.');
            try { signOut(auth); } catch(e) {}
        }
        function handleAuthActivity(event) {
            if (!auth.currentUser) return;
            if (sessionExpired()) {
                try {
                    if (event && typeof event.preventDefault === 'function') event.preventDefault();
                    if (event && typeof event.stopImmediatePropagation === 'function') event.stopImmediatePropagation();
                } catch(e) {}
                requireFreshLoginAfterTimeout();
                return;
            }
            markActivity();
        }
        ['click','keydown','input','mousemove','touchstart'].forEach(evt => {
            window.addEventListener(evt, handleAuthActivity, true);
        });

        function shouldPersistLocalKey(key) {
            // تم تعطيل snapshot الثقيل: بيانات المراقب تحفظ الآن في monitoring/appData و teachers مباشرة.
            return false;
        }
        function cleanupSchoolScopedLocalStorage() {
            const keys = [];
            try {
                for (let i = 0; i < localStorage.length; i++) {
                    const k = localStorage.key(i);
                    if (isProtectedSchool001StorageKey(k) || String(k || '').startsWith(CONTROL_LOCAL_BACKUP_PREFIX)) continue;
                    if (/^(monitoring_|savedExamDate$|control_bridge_|exam_sessions_|exam_envelopes_|exam_daily_notes_|exam_proctoring_extra_|exam_second_period_proctoring_|exam_individual_absentee_|exam_violation_|exam_signatures_|exam_signature_deletes_)/.test(k || '') || k === 'exam_control_committee_signatures_global' || k === 'monitoring_control_bridge_v1' || k === 'control_proctoring_clean_version') keys.push(k);
                }
                keys.forEach(k => localStorage.removeItem(k));
            } catch(e) { console.warn('تعذر تنظيف التخزين المحلي المؤقت', e); }
        }
        async function restoreSchoolLocalStorage(schoolId) {
            if (!schoolId || schoolId !== 'demo_school') return false;
            cleanupSchoolScopedLocalStorage();
            restoringSchoolStorage = true;
            let restored = false;
            try {
                const snap = await getDoc(fbDoc(db, 'schools', schoolId, 'controlLocalStorage', 'snapshot'));
                if (snap.exists()) {
                    const data = snap.data() || {};
                    const items = data.items || {};
                    Object.keys(items).forEach(k => {
                        if (shouldPersistLocalKey(k) && typeof items[k] === 'string') localStorage.setItem(k, items[k]);
                    });
                    restored = true;
                }
            } catch(e) {
                console.warn('تعذر استرجاع بيانات المراقب الذكي من السحابة', e);
                return false;
            } finally {
                restoringSchoolStorage = false;
            }
            return restored;
        }

        async function restoreMonitoringAppDataFromCloud(schoolId) {
            if (!schoolId) return false;
            if (CONTROL_DEFAULT_ONLY_SCHOOL_IDS.has(normalizeSchoolUserId(schoolId))) return false;
            try {
                let data = {};
                let hasData = false;
                try {
                    const snap = await getDoc(fbDoc(db, 'schools', schoolId, 'monitoring', 'appData'));
                    if (snap.exists()) {
                        data = snap.data() || {};
                        hasData = true;
                    }
                } catch(innerAppErr) {
                    console.warn('تعذر قراءة بيانات المراقب الذكي الكاملة من Firebase', innerAppErr);
                }
                try {
                    const teachersSnap = await getDoc(fbDoc(db, 'schools', schoolId, 'monitoring', 'teachers'));
                    if (teachersSnap.exists()) {
                        const teachersData = teachersSnap.data() || {};
                        if (Array.isArray(teachersData.teachers)) {
                            data = { ...data, teachers: teachersData.teachers };
                            hasData = true;
                        }
                    }
                } catch(innerTeachersErr) {
                    console.warn('تعذر قراءة نسخة المعلمين المباشرة من Firebase', innerTeachersErr);
                }
                if (!hasData) return false;
                try {
                    const cleanedCloudState = stripOldControlDerivedFieldsFromState(data || {});
                    const scopedKey = `monitoring_distribution_full_state_v4_${schoolId}`;
                    try {
                        const localRaw = localStorage.getItem(scopedKey);
                        if (localRaw) {
                            const localState = JSON.parse(localRaw);
                            const localMs = Number(localState?.clientSavedAt || Date.parse(localState?.updatedAtLocal || '') || 0);
                            const cloudMs = Number(cleanedCloudState?.clientSavedAt || Date.parse(cleanedCloudState?.updatedAtLocal || '') || 0);
                            if (localMs > cloudMs + 500) {
                                Promise.resolve(saveMonitoringStatePayloadNow({
                                    state: localState,
                                    teachers: Array.isArray(localState.teachers) ? localState.teachers : [],
                                    reason: 'restore_local_newer_monitoring_state',
                                    clientSavedAt: localMs || Date.now()
                                }, { reason: 'restore_local_newer_monitoring_state' })).catch(function(){});
                                return true;
                            }
                        }
                    } catch(localCompareErr) {}
                    const stateString = JSON.stringify(cleanedCloudState);
                    purgeOldControlDerivedDataSmartOnly();
                    try { localStorage.removeItem('monitoring_distribution_full_state_v4'); } catch(e) {}
                    try { localStorage.setItem(scopedKey, stateString); } catch(e) {}
                } catch(e) { console.warn('تعذر تجهيز بيانات المراقب الذكي محليًا', e); }
                return true;
            } catch(e) {
                console.warn('تعذر استرجاع بيانات المراقب الذكي المباشرة من Firebase', e);
                return false;
            }
        }


        function cleanFirestoreValue(value) {
            if (value === undefined) return null;
            if (value === null) return null;
            if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
            if (typeof value === 'string' || typeof value === 'boolean') return value;
            if (Array.isArray(value)) return value.map(item => cleanFirestoreValue(item));
            if (value && typeof value === 'object') {
                const out = {};
                Object.keys(value).forEach(key => {
                    const cleaned = cleanFirestoreValue(value[key]);
                    if (cleaned !== undefined) out[key] = cleaned;
                });
                return out;
            }
            return String(value || '');
        }

        let monitoringAppSaveTimer = null;
        let monitoringImmediateSaveInFlight = false;
        let monitoringImmediateSaveQueued = false;
        function getMonitoringIframeApp() {
            try {
                const frames = Array.from(document.querySelectorAll('iframe'));
                for (const frame of frames) {
                    const app = frame.contentWindow && frame.contentWindow.monitoringDistributionApp;
                    if (app && typeof app.getSerializableState === 'function') return app;
                }
            } catch(e) {}
            return null;
        }
        let monitoringPayloadSaveInFlight = false;
        let monitoringPayloadSaveQueued = null;
        let monitoringPayloadDebounceTimer = null;
        let monitoringPayloadDebounced = null;
        function scheduleMonitoringStatePayloadSave(payload = {}, options = {}) {
            // تخفيف البطء: نجمع التعديلات المتتالية في حفظ واحد بدلاً من رفع كامل البيانات مع كل نقرة.
            monitoringPayloadDebounced = { payload, options };
            clearTimeout(monitoringPayloadDebounceTimer);
            monitoringPayloadDebounceTimer = setTimeout(() => {
                const next = monitoringPayloadDebounced;
                monitoringPayloadDebounced = null;
                if (next) queueMonitoringStatePayloadSave(next.payload, next.options || {});
            }, 1000);
            return true;
        }
        async function saveMonitoringStatePayloadNow(payload = {}, options = {}) {
            const targetSchoolId = window.currentSchoolId;
            if (!targetSchoolId) return false;
            let state = payload && payload.state ? payload.state : payload;
            if (!state || typeof state !== 'object') return false;
            try {
                state = stripOldControlDerivedFieldsFromState(state);
                state = cleanFirestoreValue(state);
                const stateString = JSON.stringify(state);
                try { localStorage.removeItem('monitoring_distribution_full_state_v4'); } catch(e) {}
                try { localStorage.setItem(`monitoring_distribution_full_state_v4_${targetSchoolId}`, stateString); } catch(e) {}
                try { window.__LAST_MONITORING_STATE_STRING = stateString; } catch(e) {}
                const nowIso = new Date().toISOString();
                await setDoc(fbDoc(db, 'schools', targetSchoolId, 'monitoring', 'appData'), {
                    ...state,
                    updatedAt: serverTimestamp(),
                    updatedAtLocal: nowIso,
                    forcedSaveReason: options.reason || payload.reason || 'payload_direct_save',
                    clientSavedAt: payload.clientSavedAt || Date.now()
                }, { merge: true });
                const teachers = Array.isArray(state.teachers) ? state.teachers : (Array.isArray(payload.teachers) ? payload.teachers : null);
                if (teachers) {
                    await setDoc(fbDoc(db, 'schools', targetSchoolId, 'monitoring', 'teachers'), {
                        teachers: cleanFirestoreValue(teachers),
                        updatedAt: serverTimestamp(),
                        updatedAtLocal: nowIso,
                        forcedSaveReason: options.reason || payload.reason || 'teachers_direct_save',
                        clientSavedAt: payload.clientSavedAt || Date.now()
                    }, { merge: true });
                }
                // تم حفظ البيانات الأساسية في Firebase بنجاح هنا.
                // لا نحفظ snapshot مع كل تعديل لأن ذلك كان يسبب بطئًا شديدًا داخل المراقب الذكي.
                if (options && options.saveSnapshot === true) {
                    try {
                        await saveSchoolLocalStorageNow({ flushIframe: false, throwOnError: false });
                    } catch(snapshotErr) {
                        console.warn('تم حفظ بيانات المراقب الذكي في Firebase، لكن تعذر تحديث snapshot المحلي السحابي', snapshotErr);
                    }
                }
                return true;
            } catch(e) {
                console.warn('تعذر حفظ رسالة المراقب الذكي المباشرة في Firebase', e);
                if (options.throwOnError) throw e;
                return false;
            }
        }
        async function queueMonitoringStatePayloadSave(payload = {}, options = {}) {
            monitoringPayloadSaveQueued = { payload, options };
            if (monitoringPayloadSaveInFlight) return false;
            monitoringPayloadSaveInFlight = true;
            let lastResult = false;
            try {
                while (monitoringPayloadSaveQueued) {
                    const next = monitoringPayloadSaveQueued;
                    monitoringPayloadSaveQueued = null;
                    lastResult = await saveMonitoringStatePayloadNow(next.payload, next.options || {});
                }
                return lastResult;
            } finally {
                monitoringPayloadSaveInFlight = false;
            }
        }
        window.saveMonitoringStatePayloadNow = saveMonitoringStatePayloadNow;
        window.queueMonitoringStatePayloadSave = queueMonitoringStatePayloadSave;
        window.scheduleMonitoringStatePayloadSave = scheduleMonitoringStatePayloadSave;
        let __LAST_PARENT_MONITORING_MESSAGE_AT = 0;
        window.addEventListener('message', function(event) {
            try {
                const data = event && event.data;
                if (!data || (data.type !== 'monitoring_immediate_save_v2' && data.type !== 'monitoring_teachers_save_v2')) return;

                const reason = String(data.reason || data.type || '');
                const now = Date.now();

                // تغيير التاريخ داخل المراقب لا يحتاج حفظ سحابي كامل؛ كان سبب البطء.
                if (/date|daily|selectedDailyExamId|view_only/i.test(reason)) return;

                // تجميع الرسائل المتتابعة من iframe حتى لا نحفظ الحالة الكبيرة أكثر من مرة.
                if (now - __LAST_PARENT_MONITORING_MESSAGE_AT < 1800) {
                    clearTimeout(window.__PARENT_MONITORING_MESSAGE_TIMER);
                    window.__PARENT_MONITORING_MESSAGE_TIMER = setTimeout(() => {
                        scheduleMonitoringStatePayloadSave(data, { reason: reason || data.type });
                    }, 1800);
                    return;
                }

                __LAST_PARENT_MONITORING_MESSAGE_AT = now;
                scheduleMonitoringStatePayloadSave(data, { reason: reason || data.type });
            } catch(e) {
                console.warn('تعذر استقبال رسالة حفظ المراقب الذكي', e);
            }
        });
        async function saveMonitoringAppDataNow(options = {}) {
            if (!window.currentSchoolId) return false;
            if (options.flushIframe) flushMonitoringIframeToLocalStorage({ force: true });
            const app = getMonitoringIframeApp();

                    /^legacy_control_/,
                    /^exam_/,

                    /^subject_exceptions/,
                    /^exceptions_/,
                    /^savedExamDate$/,
                    /^smart_monitor_temp_/,
                    /^__LAST_MONITORING/
                ];

                const toRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i) || '';
                    if (key === allowedSmartKey || key === allowedDemoKey) continue;
                    if (isProtectedSchool001StorageKey(key)) continue;
                    if (key.startsWith(CONTROL_LOCAL_BACKUP_PREFIX)) continue;

                    if (/^monitoring_distribution_full_state_v4_/.test(key) && key !== allowedSmartKey && key !== allowedDemoKey) {
                        toRemove.push(key);
                        continue;
                    }

                    if (oldControlPatterns.some((r) => r.test(key))) toRemove.push(key);
                }

                [...new Set(toRemove)].forEach((key) => {
                    try { localStorage.removeItem(key); } catch(e) {}
                });

                try { sessionStorage.removeItem('smart_monitor_selected_daily_exam_id'); } catch(e) {}
                return true;
            } catch(e) {
                console.warn('تعذر حذف ملفات الكنترول القديمة', e);

            }
        }

async function openSchoolForUser(user) {
            if (!user) return;
            purgeOldControlDerivedDataSmartOnly();
            if (window.CONTROL_APP_AUTH_READY && lastOpenedAuthUid === user.uid) {
                showApp();
                return;
            }
            setAuthStatus('جاري فتح بيانات المدرسة...', 'loading');
            const userRef = fbDoc(db, 'schoolUsers', user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                await signOut(auth);
                showLogin();
                setLoginError('الحساب موجود في Authentication لكنه غير مربوط بمدرسة في schoolUsers.');
                return;
            }
            const userData = userSnap.data() || {};
            if (userData.active !== true) {
                await signOut(auth);
                showLogin();
                setLoginError('هذا الحساب غير مفعل. اجعل active = true في schoolUsers.');
                return;
            }
            const authUsername = String((user && user.email ? user.email.split('@')[0] : '') || '').trim().toLowerCase();
            const normalizedUserData = {
                ...userData,
                username: String(userData.username || authUsername || '').trim().toLowerCase()
            };
            const previousSchoolId = window.currentSchoolId || window.__CONTROL_LAST_OPENED_SCHOOL_ID || '';
            window.currentSchoolId = resolveSchoolIdForUser(user, normalizedUserData);
            const defaultOnly = isDefaultOnlySchoolUser(normalizedUserData, window.currentSchoolId);
            const effectiveUserData = defaultOnly ? sanitizeDefaultOnlySchoolInfo(normalizedUserData) : normalizedUserData;
            if (previousSchoolId && previousSchoolId !== window.currentSchoolId) {
                backupSchoolLocalRuntimeKeys(previousSchoolId);
            }
            window.currentSchoolInfo = {
                ...effectiveUserData,
                schoolId: window.currentSchoolId,
                resolvedSchoolId: window.currentSchoolId,
                defaultOnly
            };

            const switchReloadKey = `control_school_switch_reload_v2_${user.uid}_${window.currentSchoolId}`;
            if (previousSchoolId && previousSchoolId !== window.currentSchoolId && window.__CONTROL_APP_MOUNTED__ && sessionStorage.getItem(switchReloadKey) !== '1') {
                try {
                    sessionStorage.setItem(switchReloadKey, '1');
                    saveLocalControlSession(user, effectiveUserData);
                    window.__CONTROL_LAST_OPENED_SCHOOL_ID = window.currentSchoolId;
                    setAuthStatus('تم تبديل المستخدم، جاري فتح مساحة مستقلة...', 'loading');
                } catch(e) {}
                setTimeout(() => window.location.reload(), 80);
                return;
            }

            try {
                await setDoc(fbDoc(db, 'schools', window.currentSchoolId), {
                    schoolId: window.currentSchoolId,
                    schoolName: defaultOnly ? '' : (effectiveUserData.schoolName || ''),
                    username: effectiveUserData.username || '',
                    defaultOnly,
                    active: true,
                    lastOpenAt: serverTimestamp()
                }, { merge: true });
            } catch(e) { console.warn('تعذر تحديث مستند المدرسة', e); }

            if (!isSchool001User(window.currentSchoolInfo || normalizedUserData)) {
                purgeOldControlFirestoreData(window.currentSchoolId).catch(e => console.warn('تعذر تشغيل تنظيف بيانات الكنترول القديمة في الخلفية', e));
            }
            
            if (defaultOnly) {
                clearDefaultOnlyRuntimeKeys(window.currentSchoolId);
                enforceCleanDefaultMonitoringState(window.currentSchoolId);
                resetDefaultOnlyMonitoringDataInCloud(window.currentSchoolId).catch(e => console.warn('تعذر تصفير school002 في الخلفية', e));
            } else if (isSchool001User(window.currentSchoolInfo || normalizedUserData)) {
                // school001 فقط يسترجع بيانات demo_school القديمة.
            } else {
                clearMonitoringKeysForFreshUser(window.currentSchoolId);
                prepareCleanDefaultMonitoringStateForNewUser(window.currentSchoolId);
            }

            if (defaultOnly) {
                clearDefaultOnlyRuntimeKeys(window.currentSchoolId);
            } else if (!isSchool001User(window.currentSchoolInfo || normalizedUserData)) {
                purgeAllOldControlFilesAndCaches();
                restoreSchoolLocalRuntimeBackup(window.currentSchoolId);
            }
            await restoreSchoolLocalStorage(window.currentSchoolId);
            if (defaultOnly) {
                clearDefaultOnlyRuntimeKeys(window.currentSchoolId);
            } else if (!isSchool001User(window.currentSchoolInfo || normalizedUserData)) {
                purgeAllOldControlFilesAndCaches();
                restoreSchoolLocalRuntimeBackup(window.currentSchoolId);
            }
            let school001SnapshotRestored = false;
            if (isSchool001User(window.currentSchoolInfo || normalizedUserData)) {
                clearDefaultOnlyRuntimeKeys(window.currentSchoolId);
                restoreSchoolLocalRuntimeBackup(window.currentSchoolId);
                school001SnapshotRestored = await forceLoadDemoSchoolSnapshotForSchool001();
            }
            purgeOldControlDerivedDataSmartOnly();
            const smartDataRestored = defaultOnly ? false : (school001SnapshotRestored ? true : await restoreMonitoringAppDataFromCloud(window.currentSchoolId));
            if (defaultOnly) {
                enforceCleanDefaultMonitoringState(window.currentSchoolId);
            } else if (!isSchool001User(window.currentSchoolInfo || normalizedUserData) && !smartDataRestored) {
                clearMonitoringKeysForFreshUser(window.currentSchoolId);
                prepareCleanDefaultMonitoringStateForNewUser(window.currentSchoolId);
            }
            window.cloudDB = buildCloudDB();
            window.monitoringFirebase = window.cloudDB;
            try {
                localStorage.removeItem('monitoring_distribution_full_state_v4');
                const scopedKey = `monitoring_distribution_full_state_v4_${window.currentSchoolId}`;
                if (defaultOnly) {
                    prepareCleanDefaultMonitoringStateForNewUser(window.currentSchoolId, true);
                } else if (!localStorage.getItem(scopedKey) && !isSchool001User(window.currentSchoolInfo || normalizedUserData)) {
                    prepareCleanDefaultMonitoringStateForNewUser(window.currentSchoolId);
                }
            } catch(e) {}
            saveLocalControlSession(user, effectiveUserData);
            lastOpenedAuthUid = user.uid;
            window.__CONTROL_LAST_OPENED_SCHOOL_ID = window.currentSchoolId;
            window.CONTROL_APP_AUTH_READY = true;
            setAuthStatus('متصل: ' + window.currentSchoolId, 'success');
            showApp();

            window.dispatchEvent(new Event('control-auth-ready'));

        window.loginWithControlUsername = async function() {
            try {
                localStorage.removeItem(CONTROL_LOGOUT_FLAG_KEY);
                localStorage.removeItem(CONTROL_TIMEOUT_FLAG_KEY);
                sessionStorage.removeItem(CONTROL_LOGOUT_FLAG_KEY);
                sessionStorage.removeItem(CONTROL_TIMEOUT_FLAG_KEY);
                clearLocalControlSession();
                clearOldControlMonitorData();
            } catch(e) {}
            const username = (document.getElementById('control-login-username')?.value || '').trim().toLowerCase();
            const password = (document.getElementById('control-login-password')?.value || '').trim();
            if (!username || !password) {
                setLoginError('يرجى إدخال اسم المستخدم وكلمة المرور.');
                return;
            }
            const email = username.includes('@') ? username : `${username}@monitoring.local`;
            try {
                setLoginError('');
                setAuthStatus('جاري تسجيل الدخول...', 'loading');
                try { await setPersistence(auth, browserSessionPersistence); } catch(e) {}
                manualLoginInThisPage = true;
                markActivity();
                const credential = await signInWithEmailAndPassword(auth, email, password);
                markActivity();
                await openSchoolForUser(credential.user);
            } catch(error) {
                console.error(error);
                manualLoginInThisPage = false;
                setAuthStatus('تعذر الدخول', 'error');
                setLoginError('تعذر تسجيل الدخول: ' + (error.code || error.message));
            }
        };
        window.logoutControlSystem = async function() {
            if (window.__CONTROL_LOGOUT_RUNNING) return;
            window.__CONTROL_LOGOUT_RUNNING = true;
            window.__CONTROL_FAST_LOGOUT = true;

            try {
                localStorage.setItem(CONTROL_LOGOUT_FLAG_KEY, '1');
                localStorage.removeItem(CONTROL_TIMEOUT_FLAG_KEY);
                sessionStorage.setItem(CONTROL_LOGOUT_FLAG_KEY, '1');
                sessionStorage.removeItem(CONTROL_TIMEOUT_FLAG_KEY);
            } catch(e) {}

            try {
                setAuthStatus('جاري الخروج...', 'loading');
                clearTimeout(storageSaveTimer);
                clearTimeout(monitoringAppSaveTimer);
                clearTimeout(monitoringPayloadDebounceTimer);
                try { flushMonitoringStateBeforeExit('control_logout_fast_flush'); } catch(innerErr) {}
                try { flushMonitoringIframeToLocalStorage({ force: true }); } catch(innerErr) {}
                try {
                    await Promise.race([
                        forceSaveMonitoringIframeNow(),
                        new Promise(resolve => setTimeout(resolve, 900))
                    ]);
                } catch(innerErr) {}
            } catch(e) {
                console.warn('تعذر تجهيز الخروج السريع', e);
            }

            try { localStorage.removeItem(AUTH_LAST_ACTIVITY_KEY); } catch(e) {}
            clearLocalControlSession();

            try {
                window.CONTROL_APP_AUTH_READY = false;
                window.currentSchoolId = null;
                window.currentSchoolInfo = null;
                window.cloudDB = null;
                window.monitoringFirebase = null;
                lastOpenedAuthUid = null;
                manualLoginInThisPage = false;

                const root = document.getElementById('root');
                const login = document.getElementById('control-login-screen');
                if (typeof window.resetControlAppShell === 'function') window.resetControlAppShell();
                clearLoginFields();
                if (root) root.style.display = 'none';
                if (login) login.style.display = 'flex';

                setAuthStatus('تم تسجيل الخروج', 'neutral');
                setLoginError('تم تسجيل الخروج. أدخل بيانات المدرسة للدخول من جديد.');
            } catch(e) {}

            signOut(auth).catch((error) => {
                console.warn('تعذر إكمال تسجيل الخروج من Firebase', error);
            }).finally(() => {
                window.__CONTROL_LOGOUT_RUNNING = false;
            });
        };
        onAuthStateChanged(auth, async (user) => {
            try {
                if (localStorage.getItem(CONTROL_LOGOUT_FLAG_KEY) === '1' || sessionStorage.getItem(CONTROL_LOGOUT_FLAG_KEY) === '1') {
                    const timedOut = localStorage.getItem(CONTROL_TIMEOUT_FLAG_KEY) === '1' || sessionStorage.getItem(CONTROL_TIMEOUT_FLAG_KEY) === '1';
                    if (user) {
                        try { await signOut(auth); } catch(e) {}
                    }
                    resetControlRuntimeForLogin();
                    setAuthStatus(timedOut ? 'انتهت الجلسة' : 'تم تسجيل الخروج', 'neutral');
                    setLoginError(timedOut ? 'انتهت مدة الجلسة بعد 5 دقائق بدون حركة. أدخل بيانات المدرسة للدخول من جديد.' : 'تم تسجيل الخروج. أدخل بيانات المدرسة للدخول من جديد.');
                    return;
                }
            } catch(e) {}
            if (!user) {
                const timedOut = localStorage.getItem(CONTROL_TIMEOUT_FLAG_KEY) === '1' || sessionStorage.getItem(CONTROL_TIMEOUT_FLAG_KEY) === '1';
                resetControlRuntimeForLogin();
                setAuthStatus(timedOut ? 'انتهت الجلسة' : 'غير متصل بالسحابة', 'neutral');
                if (timedOut) setLoginError('انتهت مدة الجلسة بعد 5 دقائق بدون حركة. أدخل بيانات المدرسة للدخول من جديد.');
                return;
            }
            if (!manualLoginInThisPage && sessionExpired()) {
                try {
                    localStorage.setItem(CONTROL_LOGOUT_FLAG_KEY, '1');
                    localStorage.setItem(CONTROL_TIMEOUT_FLAG_KEY, '1');
                    sessionStorage.setItem(CONTROL_LOGOUT_FLAG_KEY, '1');
                    sessionStorage.setItem(CONTROL_TIMEOUT_FLAG_KEY, '1');
                    localStorage.removeItem(AUTH_LAST_ACTIVITY_KEY);
                } catch(e) {}
                resetControlRuntimeForLogin();
                try { await signOut(auth); } catch(e) {}
                setAuthStatus('انتهت الجلسة', 'neutral');
                setLoginError('انتهت مدة الجلسة بعد 5 دقائق بدون حركة. أدخل بيانات المدرسة للدخول من جديد.');
                return;
            }
            try {
                markActivity();
                markActivity();
                await openSchoolForUser(user);
            } catch(error) {
                console.error(error);
                showLogin();
                setLoginError('تعذر فتح بيانات المدرسة: ' + (error.code || error.message));
                setAuthStatus('خطأ في فتح المدرسة', 'error');
            }
        });

<script>
/* الانتقال للخلية التالية عند الضغط على Enter */
(function () {
  function isEditableField(el) {
    if (!el) return false;
    const tag = el.tagName ? el.tagName.toLowerCase() : "";
    if (tag === "input" || tag === "select") return !el.disabled && !el.readOnly && el.type !== "hidden";
    if (tag === "textarea") return !el.disabled && !el.readOnly;
    return false;
  }

  function getFocusableFields() {
    return Array.from(document.querySelectorAll("input, select, textarea"))
      .filter(isEditableField)
      .filter(el => {
        const style = window.getComputedStyle(el);
        return style.display !== "none" && style.visibility !== "hidden" && el.offsetParent !== null;
      });
  }

  document.addEventListener("keydown", function (e) {
    if (e.key !== "Enter") return;

    const current = e.target;
    if (!isEditableField(current)) return;

    const tag = current.tagName.toLowerCase();

    // داخل textarea: Enter عادي ينزل سطر، Ctrl+Enter ينتقل للحقل التالي
    if (tag === "textarea" && !e.ctrlKey) return;

    e.preventDefault();

    const fields = getFocusableFields();
    const index = fields.indexOf(current);
    if (index === -1) return;

    const next = fields[index + 1] || fields[0];
    next.focus();

    if (typeof next.select === "function" && next.tagName.toLowerCase() === "input") {
      next.select();
    }
  }, true);
})();
</script>


<script>
(function(){
  let __LAST_BRIDGE_SMART_MONITOR_AT = 0;
  function bridgeSmartMonitor(){
    try {
      const now = Date.now();
      if (now - __LAST_BRIDGE_SMART_MONITOR_AT < 900) return;
      __LAST_BRIDGE_SMART_MONITOR_AT = now;
      if (!window.currentSchoolId) return;
      var frames = Array.from(document.querySelectorAll('iframe'));
      frames.forEach(function(frame){
        try {
          var src = frame.getAttribute('src') || '';
          var title = frame.getAttribute('title') || '';
          if (!src.includes('smart_monitor') && !title.includes('المراقب')) return;

          var w = frame.contentWindow;
          if (!w) return;

          w.currentSchoolId = window.currentSchoolId;
          w.monitoringFirebase = window.monitoringFirebase || window.cloudDB || null;
          w.cloudDB = window.monitoringFirebase || window.cloudDB || null;

          if (typeof w.updateCloudStatus === 'function' && (window.monitoringFirebase || window.cloudDB)) {
            w.updateCloudStatus('متصل بالسحابة', 'success');
          }
          if (w.monitoringDistributionApp && typeof w.monitoringDistributionApp.ensureParentFirebaseBridge === 'function') {
            w.monitoringDistributionApp.ensureParentFirebaseBridge();
          }
        } catch(e) {}
      });
    } catch(e) {}
  }

  window.bridgeSmartMonitor = bridgeSmartMonitor;
  window.addEventListener('firebase-ready', function(){
    setTimeout(bridgeSmartMonitor, 300);
    setTimeout(bridgeSmartMonitor, 1000);
  });
  window.addEventListener('control-auth-ready', function(){
    setTimeout(bridgeSmartMonitor, 300);
    setTimeout(bridgeSmartMonitor, 1000);
  });
  window.addEventListener('smart-data-refreshed', bridgeSmartMonitor);
})();
